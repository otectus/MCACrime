modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

# MCA: Crime is meaningless without MCA Reborn, so MCA is a mandatory dependency.
# We load AFTER MCA so its entities, professions, and registries are present.
[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="mca"
    mandatory=true
    versionRange="[7.6,8)"
    ordering="AFTER"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="architectury"
    mandatory=true
    versionRange="[9.2,10)"
    ordering="AFTER"
    side="BOTH"
