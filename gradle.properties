# Memory for the Minecraft decompile/setup. Daemon off to avoid stale-JDK daemons.
org.gradle.jvmargs=-Xmx4G
org.gradle.daemon=false
# Force Gradle + the toolchain onto JDK 17 (system default here is JDK 21, which
# ForgeGradle 6 does not tolerate). Change if your JDK 17 lives elsewhere.
org.gradle.java.home=/usr/lib/jvm/java-17-openjdk-amd64

## Minecraft / Forge
minecraft_version=1.20.1
minecraft_version_range=[1.20.1,1.21)
forge_version=47.4.10
forge_version_range=[47,)
loader_version_range=[47,)
mapping_channel=official
mapping_version=1.20.1

## Dependencies (MCA Reborn pulls Architectury at runtime)
# MCA Reborn for 1.20.1 Forge, via Modrinth Maven (accepts the version string directly).
mca_version=7.6.20+1.20.1
# Architectury API (Forge) — hard runtime requirement of MCA's Forge build.
architectury_version=9.2.14

## Mod metadata
mod_id=mcacrime
mod_name=MCA: Crime
# GPL-3.0 to match MCA Reborn, whose internals this mod links against. See the LICENSE file.
mod_license=GPL-3.0-only
mod_version=0.1.0
mod_group_id=dev.otectus.mcacrime
mod_authors=otectus
mod_description=A server-authoritative village law-and-crime framework for Minecraft Comes Alive: Reborn.
